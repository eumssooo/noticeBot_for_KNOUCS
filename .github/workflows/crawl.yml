name: School Notice Crawler

on:
  schedule:
    - cron: "*/30 0-11 * * *"  # 한국시간 09:00~20:30, 30분 간격
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run crawler
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python crawler.py

      - name: Commit updated state
        run: |
          git config user.name "notice-bot"
          git config user.email "bot@example.com"
          git add seen_ids.json
          git diff --staged --quiet || git commit -m "update seen notices"
          git push